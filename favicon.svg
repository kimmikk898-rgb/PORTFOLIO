<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100">
  <defs>
    <linearGradient id="ga" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#00d2ff"/>
      <stop offset="100%" stop-color="#3a7bd5"/>
    </linearGradient>
    <linearGradient id="gb" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#3a7bd5"/>
      <stop offset="100%" stop-color="#7c3aed"/>
    </linearGradient>
    <linearGradient id="gc" x1="0%" y1="100%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#00d2ff"/>
      <stop offset="100%" stop-color="#7c3aed"/>
    </linearGradient>
  </defs>

  <!-- Background rounded square rotated slightly -->
  <rect x="8" y="8" width="84" height="84" rx="14" fill="#070e1c" transform="rotate(6,50,50)"/>
  <rect x="8" y="8" width="84" height="84" rx="14" fill="none" stroke="url(#gc)" stroke-width="2" transform="rotate(6,50,50)" opacity="0.6"/>

  <!-- R -->
  <text x="28" y="68" text-anchor="middle"
    font-family="Georgia, serif" font-size="52" font-weight="700"
    fill="url(#ga)">R</text>

  <!-- K -->
  <text x="72" y="68" text-anchor="middle"
    font-family="Georgia, serif" font-size="52" font-weight="700"
    fill="url(#gb)">K</text>

  <!-- Bottom dots -->
  <circle cx="50" cy="88" r="2.5" fill="url(#gc)"/>
  <circle cx="40" cy="88" r="1.8" fill="#3a7bd5" opacity="0.5"/>
  <circle cx="60" cy="88" r="1.8" fill="#3a7bd5" opacity="0.5"/>
</svg>
